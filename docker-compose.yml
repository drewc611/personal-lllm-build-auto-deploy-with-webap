services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=development
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - .:/app

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/data
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
