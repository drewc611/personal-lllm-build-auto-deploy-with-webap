<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Web App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container mt-5">
    <h1>Personal LLM Web App</h1>
    <p class="text-muted">Run the local Ollama model and start workflows from one page.</p>

    <div class="row gy-4">
      <div class="col-lg-8">
        <div class="card p-4">
          <h4>Ask the local model</h4>
          <form id="prompt-form" onsubmit="return false;">
            <div class="mb-3">
              <label for="prompt" class="form-label">Prompt</label>
              <textarea id="prompt" class="form-control" rows="4" placeholder="Enter a question for the local model."></textarea>
            </div>
            <button type="button" class="btn btn-primary" onclick="submitPrompt()">Generate</button>
          </form>

          <div class="mt-4">
            <h5>Model output</h5>
            <pre id="completion" class="border rounded p-3" style="min-height: 160px;">Enter a prompt and press Generate.</pre>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card p-4 mb-3">
          <h4>Workflow actions</h4>
          <p>Use these buttons to start local workflows.</p>
          <button class="btn btn-secondary w-100 mb-2" onclick="runWorkflow('lora')">Start LoRA</button>
          <button class="btn btn-success w-100" onclick="runWorkflow('nanogpt')">Start nanoGPT</button>
        </div>

        <div class="card p-4">
          <h4>Backend</h4>
          <p class="mb-1"><strong>Model:</strong> {{ model }}</p>
          <p class="mb-0"><strong>Ollama URL:</strong> {{ ollama_url }}</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function submitPrompt() {
      const prompt = document.getElementById('prompt').value.trim();
      const output = document.getElementById('completion');
      if (!prompt) {
        output.innerText = 'Please enter a prompt.';
        return;
      }

      output.innerText = 'Generating...';
      const response = await fetch('/completion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const result = await response.json();
      if (response.ok) {
        output.innerText = result.completion;
      } else {
        output.innerText = `Error: ${result.message}`;
      }
    }

    async function runWorkflow(action) {
      const response = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action })
      });
      const result = await response.json();
      const output = document.getElementById('completion');
      output.innerText = JSON.stringify(result, null, 2);
    }
  </script>
</body>
</html>
